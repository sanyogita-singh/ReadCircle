{% extends 'base.html' %}
{% block content %}

<div class="d-flex align-items-center justify-content-center" style="min-height: 90vh;">

  <div class="col-md-8 col-lg-6">

    <div class="card border-0 shadow-lg p-4">

      <!-- 🔷 HEADER -->
      <div class="text-center mb-4">
        <h2 class="fw-bold">Create Your Account</h2>
        <p class="text-muted small">
          Join Book Hunter and start exchanging knowledge
        </p>
      </div>

      <!-- 🔷 FORM -->
      <form method="post">

        <div class="row g-3">

          <!-- DISPLAY NAME -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">Display Name</label>
            <input name="display_name"
                   class="form-control form-control-lg"
                   placeholder="Your name"
                   required>
          </div>

          <!-- USERNAME -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">Username</label>
            <input name="username"
                   class="form-control form-control-lg"
                   placeholder="Choose a username"
                   required>
          </div>

          <!-- PASSWORD -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">Password</label>
            <input type="password"
                   name="password"
                   class="form-control form-control-lg"
                   placeholder="Create a strong password"
                   required>
          </div>

          <!-- EMAIL -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">Email (optional)</label>
            <input name="contact_email"
                   type="email"
                   class="form-control form-control-lg"
                   placeholder="you@example.com">
          </div>

          <!-- PHONE -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">Phone (optional)</label>
            <input name="contact_phone"
                   class="form-control form-control-lg"
                   placeholder="Enter phone number">
          </div>

        </div>

        <!-- TERMS -->
        <div class="form-check mt-3">
          <input class="form-check-input" type="checkbox" id="terms" required>
          <label class="form-check-label small text-muted" for="terms">
            I agree to the terms and conditions
          </label>
        </div>

        <!-- BUTTON -->
        <button class="btn btn-primary w-100 btn-lg mt-3" type="submit">
          🚀 Create Account
        </button>

      </form>

      <!-- 🔷 FOOTER -->
      <div class="text-center mt-4">
        <p class="small text-muted mb-0">
          Already have an account?
          <a href="{{ url_for('login') }}" class="fw-semibold text-decoration-none">
            Login
          </a>
        </p>
      </div>

    </div>

  </div>

</div>

{% endblock %}
